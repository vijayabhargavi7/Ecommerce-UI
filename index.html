<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <h2>ShopEasee</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Cart</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>Welcome to ShopEasee</h1>
    <p>Best products at best prices</p>
    <button>Shop Now</button>
</section>

<!-- Products -->
<section class="products">
    <h2>Products</h2>

    <div class="product-container">

        <div class="card">
            <img src="https://images.pexels.com/photos/298863/pexels-photo-298863.jpeg">
            <h3>Product 1</h3>
            <p>$200</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/18105/pexels-photo.jpg">
            <h3>Product 2</h3>
            <p>$3000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.pexels.com/photos/19090/pexels-photo.jpg">
            <h3>Product 3</h3>
            <p>$400</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 ShopEasy</p>
</footer>

</body>
</html>
